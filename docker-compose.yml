# TOTO WC-2026 — production stack (architecture/02 §7, 12 §5.3).
# caddy (HTTPS) → app (Next.js) ; worker (node-cron) ; db (Postgres, internal only).
# A one-shot `migrate` service applies migrations + seed before app/worker start.
#
# Secrets live in a root-only .env (chmod 600). DATABASE_URL is overridden here to
# the internal `db` host, so the same .env works for host scripts and containers.

networks:
  toto_net:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [toto_net]
    # No 'ports:' — Postgres stays on the internal network only (12 §5.1).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: toto-app:latest
    command: ["sh", "-c", "node dist/migrate.cjs && node dist/seed.cjs"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks: [toto_net]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: toto-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # Bound to localhost only; Caddy fronts the public 443. Handy for debugging.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [toto_net]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: toto-app:latest
    command: ["node", "dist/worker.cjs"]
    # node-cron process — no HTTP port, so the app's port-3000 healthcheck does not apply.
    healthcheck:
      disable: true
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [toto_net]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [app]
    networks: [toto_net]
